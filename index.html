<html lang="de">

    <!-- Favicon -->

    <link rel="apple-touch-icon" href="/assets/cropped-Logoweb.png" />

    <title>Kultur Plattform Freiburg</title>

      name="description"
      content="Kultur Plattform Freiburg (KPF) ist eine Initiative, die den kulturellen Austausch und das gesellschaftliche Engagement in Freiburg fördert."
    />

    <link rel="canonical" href="https://kultur-plattform-freiburg.de/" />

    <!-- Open Graph / Meta -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kultur-plattform-freiburg.de/" />

    <meta
      property="og:description"
      content="Kultur Plattform Freiburg (KPF) ist eine Initiative, die den kulturellen Austausch und das gesellschaftliche Engagement in Freiburg fördert."
    />
    <meta property="og:image" content="/assets/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kultur Plattform Freiburg" />

      name="twitter:description"
      content="Kultur Plattform Freiburg (KPF) ist eine Initiative, die den kulturellen Austausch und das gesellschaftliche Engagement in Freiburg fördert."
    />
    <meta name="twitter:image" content="/assets/og-image.jpg" />

    <!-- Multi-language SEO -->
    <link
      rel="alternate"
      hreflang="de"
      href="https://kultur-plattform-freiburg.de/"
    />
    <link
      rel="alternate"
      hreflang="tr"
      href="https://kultur-plattform-freiburg.de/?lang=tr"
    />
    <link
      rel="alternate"
      hreflang="x-default"
      href="https://kultur-plattform-freiburg.de/"
    />

    />

    <!-- Structured Data (JSON-LD) for SEO -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Kultur Plattform Freiburg",
        "alternateName": "KPF",
        "url": "https://kultur-plattform-freiburg.de",
        "logo": "https://kultur-plattform-freiburg.de/assets/cropped-Logoweb.png",
        "description": "Kultur Plattform Freiburg (KPF) ist eine Initiative, die den kulturellen Austausch und das gesellschaftliche Engagement in Freiburg fördert.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Freiburg",
          "addressCountry": "DE"
        },
        "sameAs": [
          "https://www.instagram.com/kpf_freiburg",
          "https://www.facebook.com/KPFFreiburg"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "General Inquiries",
          "email": "info@kultur-plattform-freiburg.de"
        }
      }
    </script>

    <script type="importmap">
